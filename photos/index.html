<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photos | Jorge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #f0e8ff;
            --bg-secondary: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #555555;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --radius-sm: 12px;
            --radius-lg: 24px;
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --transition-normal: 0.25s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-family);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 3rem 2rem; }
        .header { margin-bottom: 3rem; max-width: 600px; }
        .header-title { font-size: 2.5rem; font-weight: 700; margin-bottom: 0.75rem; }
        .header-title a {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
        }
        .header-title a:hover { text-decoration: underline; }
        .header-subtitle { font-size: 1.25rem; color: var(--text-secondary); }
        .content { margin-top: 2rem; }
        .content p { margin-bottom: 1.5rem; color: var(--text-secondary); }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
        }
        .gallery-item {
            aspect-ratio: 1 / 1;
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            border: 1px solid rgba(0, 0, 0, 0.05);
            transition: transform var(--transition-normal), box-shadow var(--transition-normal);
        }
        .gallery-item:hover {
            transform: scale(1.02);
            box-shadow: var(--shadow-md);
        }
        @media (max-width: 768px) {
            .container { padding: 2rem 1.5rem; }
            .header-title { font-size: 2.25rem; }
        }
    </style>
</head>
<body>
    <main class="container">
        <header class="header">
            <h1 class="header-title"><a href="../">← </a>Photos</h1>
            <p class="header-subtitle">A visual collection.</p>
        </header>
        <div class="content">
            <p>Photos I've taken or collected. More to come.</p>
            <div class="gallery">
                <div class="gallery-item"></div>
                <div class="gallery-item"></div>
                <div class="gallery-item"></div>
                <div class="gallery-item"></div>
                <div class="gallery-item"></div>
                <div class="gallery-item"></div>
            </div>
        </div>
    </main>
</body>
</html>
